<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In or Create Account – NexCart</title>
  <meta name="description" content="Sign in to your NexCart account or create a new one to start shopping smarter.">
  <meta name="author" content="Siddharth Sharma">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style2.css" />
  <link rel="shortcut icon" href="nexcart-icon.svg" type="image/x-icon">
</head>
<body>
  <div class="auth-bg">
    <div class="wrapper">

      <!-- Branding -->
      <div class="brand">
        <a href="index.html" style="display:inline-block;margin-bottom:8px;color:#ef4444;font-size:13px;text-decoration:none;opacity:0.85;">&#8592; Back to NexCart</a>
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1 class="brand-title">Welcome Back</h1>
        <p class="brand-sub" id="brandSub">Sign in to your account</p>
      </div>

      <!-- Card -->
      <div class="card">
        <div class="card-glow"></div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- ── LOGIN FORM ── -->
        <form id="loginForm" class="form" onsubmit="handleLogin(event)">
          <div id="loginAlert" class="alert hidden"></div>

          <div class="field">
            <label class="field-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" id="loginEmail" class="input" placeholder="you@example.com" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <div class="field-header">
              <label class="field-label">Password</label>
              <a href="#" class="link-red">Forgot password?</a>
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="loginPassword" class="input" placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="eye-btn" onclick="togglePass('loginPassword', this)">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="remember" class="checkbox" />
            <label for="remember" class="checkbox-label">Remember me for 30 days</label>
          </div>

          <button type="submit" class="btn-primary">
            <span class="btn-text">Sign In</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <span class="spinner hidden"></span>
          </button>

          <div class="divider">or continue with</div>

          <div class="social-grid">
            <button type="button" class="social-btn">
              <svg width="17" height="17" viewBox="0 0 48 48" fill="none"><path d="M44.5 20H24v8.5h11.7C34.5 33.3 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8.1 3l6-6C34.5 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5c11.1 0 20-8 20-20 0-1.3-.1-2.7-.5-4z" fill="#FFC107"/><path d="M6.3 14.7l7 5.1C15.2 16.4 19.3 13.5 24 13.5c3.1 0 5.9 1.1 8.1 3l6-6C34.5 6.5 29.5 4.5 24 4.5c-7.6 0-14.2 4.3-17.7 10.2z" fill="#FF3D00"/><path d="M24 45.5c5.4 0 10.2-1.8 13.9-4.8l-6.4-5.4C29.4 36.9 26.8 37.5 24 37.5c-5.9 0-10.9-3.9-12.7-9.3l-7 5.4C8.1 41.3 15.5 45.5 24 45.5z" fill="#4CAF50"/><path d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.3-4.3 5.7l6.4 5.4C42 36 44.5 30.9 44.5 25c0-1.3-.1-2.7-.5-4z" fill="#1976D2"/></svg>
              Google
            </button>
            <button type="button" class="social-btn">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .269.18.58.688.482C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
              GitHub
            </button>
          </div>
        </form>

        <!-- ── SIGNUP FORM ── -->
        <form id="signupForm" class="form hidden" onsubmit="handleSignup(event)">
          <div id="signupAlert" class="alert hidden"></div>

          <div class="field">
            <label class="field-label">Full Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
              </span>
              <input type="text" id="signupName" class="input" placeholder="John Doe" autocomplete="name" />
            </div>
          </div>

          <div class="field">
            <label class="field-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" id="signupEmail" class="input" placeholder="you@example.com" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="signupPassword" class="input" placeholder="At least 8 characters" autocomplete="new-password" oninput="updateStrength()" />
              <button type="button" class="eye-btn" onclick="togglePass('signupPassword', this)">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div id="strengthWrap" class="strength-wrap hidden">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="signupConfirm" class="input" placeholder="Repeat your password" autocomplete="new-password" oninput="checkMatch()" />
              <button type="button" class="eye-btn" onclick="togglePass('signupConfirm', this)">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="match-label hidden" id="matchLabel"></span>
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="terms" class="checkbox" />
            <label for="terms" class="checkbox-label">
              I agree to the <a href="#" class="link-red">Terms of Service</a> and <a href="#" class="link-red">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn-primary" id="signupBtn">
            <span class="btn-text">Create Account</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <span class="spinner hidden"></span>
      
          </button>

          <div class="divider">or sign up with</div>

          <div class="social-grid">
            <button type="button" class="social-btn">
              <svg width="17" height="17" viewBox="0 0 48 48" fill="none"><path d="M44.5 20H24v8.5h11.7C34.5 33.3 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8.1 3l6-6C34.5 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5c11.1 0 20-8 20-20 0-1.3-.1-2.7-.5-4z" fill="#FFC107"/><path d="M6.3 14.7l7 5.1C15.2 16.4 19.3 13.5 24 13.5c3.1 0 5.9 1.1 8.1 3l6-6C34.5 6.5 29.5 4.5 24 4.5c-7.6 0-14.2 4.3-17.7 10.2z" fill="#FF3D00"/><path d="M24 45.5c5.4 0 10.2-1.8 13.9-4.8l-6.4-5.4C29.4 36.9 26.8 37.5 24 37.5c-5.9 0-10.9-3.9-12.7-9.3l-7 5.4C8.1 41.3 15.5 45.5 24 45.5z" fill="#4CAF50"/><path d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.3-4.3 5.7l6.4 5.4C42 36 44.5 30.9 44.5 25c0-1.3-.1-2.7-.5-4z" fill="#1976D2"/></svg>
              Google
            </button>
            <button type="button" class="social-btn">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .269.18.58.688.482C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
              GitHub
            </button>
          </div>
        </form>
      </div>

      <!-- Footer -->
      <p class="footer-switch" id="footerSwitch">
        Don't have an account?
        <button class="link-red bold" onclick="switchTab('signup')">Sign up for free</button>
      </p>
      <p class="footer-secure">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Welcome to NexCart, Made with ❤️ By Siddharth .All rights reserved.
      </p>
    </div>
  </div>

  <script>
    let activeTab = 'login';

    window.addEventListener('DOMContentLoaded', function() {
      const hash = window.location.hash;
      if (hash === '#signup') {
        switchTab('signup');
      } else {
        switchTab('login');
      }
    });

    function switchTab(tab) {
      activeTab = tab;
      const isLogin = tab === 'login';

      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('signupForm').classList.toggle('hidden', isLogin);

      document.getElementById('brandSub').textContent = isLogin
        ? 'Sign in to your account'
        : 'Create a new account';

      document.getElementById('footerSwitch').innerHTML = isLogin
        ? `Don't have an account? <button class="link-red bold" onclick="switchTab('signup')">Sign up for free</button>`
        : `Already have an account? <button class="link-red bold" onclick="switchTab('login')">Sign in</button>`;

      clearAlert('loginAlert');
      clearAlert('signupAlert');
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      clearAlert('loginAlert');
      if (!email || !pass) { showAlert('loginAlert', 'Please fill in all fields.', 'error'); return; }
      const btn = e.target.querySelector('.btn-primary');
      setLoading(btn, true);
      setTimeout(() => {
        setLoading(btn, false);
        showAlert('loginAlert', 'Signed in successfully! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      }, 1400);
    }

    function handleSignup(e) {
      e.preventDefault();
      const name    = document.getElementById('signupName').value.trim();
      const email   = document.getElementById('signupEmail').value.trim();
      const pass    = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const agreed  = document.getElementById('terms').checked;
      clearAlert('signupAlert');
      if (!name || !email || !pass || !confirm) { showAlert('signupAlert', 'Please fill in all fields.', 'error'); return; }
      if (pass !== confirm) { showAlert('signupAlert', 'Passwords do not match.', 'error'); return; }
      if (pass.length < 8) { showAlert('signupAlert', 'Password must be at least 8 characters.', 'error'); return; }
      if (!agreed) { showAlert('signupAlert', 'You must agree to the Terms of Service.', 'error'); return; }
      const btn = e.target.querySelector('.btn-primary');
      setLoading(btn, true);
      setTimeout(() => {
        setLoading(btn, false);
        showAlert('signupAlert', 'Account created! Welcome aboard. Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      }, 1400);
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert hidden';
      el.textContent = '';
    }

    function setLoading(btn, loading) {
      btn.querySelector('.btn-text').style.display = loading ? 'none' : '';
      btn.querySelector('svg').style.display = loading ? 'none' : '';
      btn.querySelector('.spinner').classList.toggle('hidden', !loading);
      btn.disabled = loading;
    }

    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('.eye-open').style.opacity = isText ? '1' : '0.4';
    }

    function updateStrength() {
      const pass = document.getElementById('signupPassword').value;
      const wrap  = document.getElementById('strengthWrap');
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!pass) { wrap.classList.add('hidden'); return; }
      wrap.classList.remove('hidden');
      let score = 0;
      if (pass.length >= 8) score++;
      if (/[A-Z]/.test(pass)) score++;
      if (/[0-9]/.test(pass)) score++;
      if (/[^A-Za-z0-9]/.test(pass)) score++;
      const map = [
        { w: '25%', color: '#ef4444', text: 'Weak' },
        { w: '25%', color: '#ef4444', text: 'Weak' },
        { w: '50%', color: '#f97316', text: 'Fair' },
        { w: '75%', color: '#eab308', text: 'Good' },
        { w: '100%', color: '#22c55e', text: 'Strong' },
      ];
      const s = map[score];
      fill.style.width = s.w;
      fill.style.background = s.color;
      label.textContent = s.text + ' password';
      label.style.color = s.color;
    }

    function checkMatch() {
      const pass    = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const label   = document.getElementById('matchLabel');
      if (!confirm) { label.classList.add('hidden'); return; }
      label.classList.remove('hidden');
      if (pass === confirm) {
        label.textContent = 'Passwords match';
        label.style.color = '#4ade80';
      } else {
        label.textContent = 'Passwords do not match';
        label.style.color = '#f87171';
      }
    }
  </script>
</body>
</html>
